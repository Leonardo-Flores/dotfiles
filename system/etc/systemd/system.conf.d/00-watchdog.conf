[Manager]
# Use the hardware watchdog (sp5100_tco on AMD) so the kernel force-reboots
# the box if userspace (systemd PID 1) stops pinging it for 20s. This rescues
# us from amdgpu hangs that otherwise require pulling the power.
RuntimeWatchdogSec=20s

# If shutdown/reboot stalls (e.g. GPU is wedged and a service won't stop),
# arm the watchdog to force a hard reboot after 2 minutes instead of hanging
# forever waiting for systemd-shutdown.
RebootWatchdogSec=2min

# Cap how long systemd waits on a stuck service before SIGKILL during stop.
# Default is 90s; 15s is plenty for a desktop and makes shutdowns snappy.
DefaultTimeoutStopSec=15s
DefaultTimeoutAbortSec=15s
