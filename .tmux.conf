# Prefix: Ctrl+A (more ergonomic than Ctrl+B)
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with intuitive keys (in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in current directory too
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (vim-tmux-navigator aware)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
# Fallback prefix-based navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Vim keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Mouse support
set -g mouse on

# Fix colors and undercurl support (for LSP diagnostics in nvim)
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Start windows and panes at 1 (not 0) — easier to reach
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Don't wait for escape sequences (faster vim response)
set -sg escape-time 0

# Longer history
set -g history-limit 50000

# Status bar — Catppuccin-ish to match your theme
set -g status-position bottom
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left '#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[default] '
set -g status-right '#[fg=#a6adc8] %H:%M | %d/%m '
set -g status-left-length 30
setw -g window-status-current-format '#[bg=#45475a,fg=#cdd6f4,bold] #I:#W '
setw -g window-status-format '#[fg=#6c7086] #I:#W '

# Active pane border matches your Hyprland accent
set -g pane-active-border-style 'fg=#cba6f7'
set -g pane-border-style 'fg=#45475a'

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# tmux-resurrect: save/restore sessions
# Ctrl+A then Ctrl+S to save, Ctrl+A then Ctrl+R to restore
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save every 15 minutes
set -g @continuum-restore 'on'

# Auto-install TPM if missing
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
