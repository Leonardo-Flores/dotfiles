general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Dim screen after 3 minutes
listener {
    timeout = 180
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# Lock screen after 5 minutes
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn off display after 8 minutes
listener {
    timeout = 480
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# NOTE: systemctl suspend is intentionally disabled.
# AMD RDNA3 (RX 7000 series) has known amdgpu suspend bugs that trigger
# MODE1 GPU resets on resume, hanging the compositor and forcing a TTY
# reboot. DPMS off above is sufficient for power saving on a desktop.
# Re-enable only after testing on a kernel/firmware where the bug is fixed.
# listener {
#     timeout = 900
#     on-timeout = systemctl suspend
# }
