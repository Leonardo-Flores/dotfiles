general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

# Same wallpaper as desktop, blurred
background {
    monitor =
    path = $HOME/wallpapers/current.jpg
    blur_passes = 0
    blur_size = 0
    brightness = 1.0
}

# Time (top of screen)
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = top
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.5
}

# Date (below clock, still at top)
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgba(220, 220, 230, 0.9)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -195
    halign = center
    valign = top
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.5
}

# Password input (below center)
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text = <i>  Password...</i>
    hide_input = false
    check_color = rgba(166, 227, 161, 0.6)
    fail_color = rgba(243, 139, 168, 0.6)
    position = 0, -200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.6)
}

# Username (below password input)
label {
    monitor =
    text =  $USER
    color = rgba(255, 255, 255, 0.8)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -260
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.5
}
