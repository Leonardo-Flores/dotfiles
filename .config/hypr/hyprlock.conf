general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

# Blurred wallpaper background
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    brightness = 0.6
}

# Time
label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %d de %B"
    color = rgba(166, 173, 200, 0.8)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(203, 166, 247, 0.4)
    inner_color = rgba(30, 30, 46, 0.9)
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = false
    placeholder_text = <i>  Senha...</i>
    hide_input = false
    check_color = rgba(166, 227, 161, 0.6)
    fail_color = rgba(243, 139, 168, 0.6)
    position = 0, -40
    halign = center
    valign = center
}

# Username
label {
    monitor =
    text =  $USER
    color = rgba(203, 166, 247, 0.8)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
}
