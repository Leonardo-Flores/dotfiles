general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    color = rgb(0, 0, 0) # Preto puro para casar com seu terminal
}

# RELÓGIO
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# INPUT DE SENHA
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(20, 20, 20, 1.0)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Senha...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

# USUÁRIO (Opcional, logo abaixo do input)
label {
    monitor =
    text = $USER
    color = rgba(200, 200, 200, 0.6)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}
