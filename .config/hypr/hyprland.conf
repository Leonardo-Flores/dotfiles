#Monitors (auto detect resolution)
monitor=,preferred,auto,1

# GTK / Qt theming
env = GTK_THEME,catppuccin-mocha-mauve-standard+default
env = QT_QPA_PLATFORMTHEME,qt6ct
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "catppuccin-mocha-mauve-standard+default"
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark"
exec-once = gsettings set org.gnome.desktop.interface cursor-theme "Bibata-Modern-Ice"
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24

# Garanta que o Wofi morra ao reiniciar para pegar a config nova
exec-once = killall wofi || true

#Start with system
exec-once = waybar & awww-daemon
exec-once = ~/.config/hypr/wallpaper.sh
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swaync
# Network managed by waybar network module (on-click opens nm-connection-editor)
# exec-once = nm-applet --indicator

# Inicia o monitoramento do clipboard
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

#Basic definitions
input {
	kb_layout = br
	follow_mouse = 1
	touchpad {
		natural_scroll = yes
		scroll_factor = 0.2
	}
}

general {
	gaps_in = 0
	gaps_out = 0
	border_size = 2
	col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
	col.inactive_border = rgba(585b70aa)
	layout = dwindle
}

decoration {
	rounding = 0

	blur {
		enabled = true
		size = 6
		passes = 3
		new_optimizations = true
		ignore_opacity = true
	}

	shadow {
		enabled = true
		range = 15
		render_power = 3
		color = rgba(1a1a2eee)
	}
}

animations {
	enabled = true

	bezier = smooth, 0.25, 0.1, 0.25, 1
	bezier = gentle, 0.4, 0, 0.2, 1

	animation = windows, 1, 3, gentle, slide
	animation = windowsOut, 1, 3, smooth, slide
	animation = windowsMove, 1, 3, smooth, slide
	animation = border, 1, 8, smooth
	animation = fade, 1, 3, smooth
	animation = fadeDim, 1, 3, smooth
	animation = workspaces, 1, 4, gentle, slide
}

#Hotkeys
$mainMod = SUPER

bind = $mainMod, Q, exec, /home/leonardoflores/.local/bin/kitty-here
bind = $mainMod, C, killactive,
bind = $mainMod, F, exec, pkill -SIGUSR1 waybar
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, X, togglefloating,
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, W, exec, ~/.config/hypr/wallpaper-cycle.sh
bind = $mainMod, P, pseudo, #dwindle
bind = $mainMod, T, togglesplit, #dwindle
bind = CTRL SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

bind = , Print, exec, grim - | wl-copy

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move a janela focada para uma nova área de trabalho e VAI junto com ela
bind = $mainMod SHIFT, N, movetoworkspace, empty

# Move a janela focada para uma nova área de trabalho e FICA na atual (silencioso)
bind = $mainMod ALT, N, movetoworkspacesilent, empty

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, Tab, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#lock screen
bind = $mainMod, ESCAPE, exec, hyprlock

# Movimentação de foco com H J K L
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Opcional: Mover as janelas de lugar com H J K L (usando Shift)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}
# Waybar popup apps: float near the bar
windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol|org.pulseaudio.pavucontrol)$

    float = true
    size = 600 450
    move = cursor -300 28
}

windowrule {
    name = float-nm-editor
    match:class = ^(nm-connection-editor)$

    float = true
    size = 500 400
    move = cursor -250 28
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Terminal transparency
windowrule {
    name = kitty-opacity
    match:class = ^(kitty)$

    opacity = override 1.0 override 0.85
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

