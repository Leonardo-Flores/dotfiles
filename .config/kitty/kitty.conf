# Fontes
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# Padding
window_padding_width 6

# Catppuccin Mocha
foreground            #cdd6f4
background            #1e1e2e
selection_foreground  #1e1e2e
selection_background  #f5e0dc
url_color             #f5e0dc
cursor                #f5e0dc
cursor_text_color     #1e1e2e

# Black
color0   #45475a
color8   #585b70

# Red
color1   #f38ba8
color9   #f38ba8

# Green
color2   #a6e3a1
color10  #a6e3a1

# Yellow
color3   #f9e2af
color11  #f9e2af

# Blue
color4   #89b4fa
color12  #89b4fa

# Magenta
color5   #cba6f7
color13  #cba6f7

# Cyan
color6   #94e2d5
color14  #94e2d5

# White
color7   #bac2de
color15  #a6adc8

# Scrollback
scrollback_lines 10000

# Vim-style scrolling
map ctrl+u scroll_page_up
map ctrl+d scroll_page_down
map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down

# Background opacity (for blur to show through)
background_opacity 0.92
